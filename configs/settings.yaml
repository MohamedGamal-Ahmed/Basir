# Basir Web Co-Pilot - Configuration
# ====================================

# Google AI Studio
# API Key is loaded from .env file (GOOGLE_API_KEY)
api:
  provider: "google_ai"

# Gemini Models
models:
  flash: "gemini-2.5-flash"
  pro: "gemini-2.5-pro"

# Browser Settings
browser:
  headless: true
  viewport:
    width: 1920
    height: 1080

# Agent Settings
agent:
  max_retries: 3        # الحد الأقصى لمحاولات التعافي الذاتي
  step_timeout: 10000   # مهلة كل خطوة بالميلي ثانية

# Reporter Settings
reporter:
  output_dir: "reports"
  format: "json"
